<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Médico — HCHM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
  <h2>Panel Médico — {{ request.user.username }}</h2>
  <table class="table table-striped">
    <thead><tr><th>Nombre</th><th>RUT</th><th>Diagnóstico</th></tr></thead>
    <tbody>
      {% for p in pacientes %}
      <tr><td>{{ p.nombre }}</td><td>{{ p.rut }}</td><td>{{ p.diagnostico }}</td></tr>
      {% empty %}<tr><td colspan="3">Sin pacientes registrados</td></tr>{% endfor %}
    </tbody>
  </table>
</body>
</html>
