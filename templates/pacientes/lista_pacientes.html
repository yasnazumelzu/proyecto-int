<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pacientes — HCHM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
  <h2>Pacientes</h2>
  <a href="{% url 'nuevo_paciente' %}" class="btn btn-success mb-3">Nuevo Paciente</a>
  <table class="table table-bordered">
    <thead><tr><th>RUT</th><th>Nombre</th><th>Edad</th><th>Diagnóstico</th><th></th></tr></thead>
    <tbody>
      {% for p in pacientes %}
      <tr>
        <td>{{ p.rut }}</td>
        <td>{{ p.nombre }}</td>
        <td>{{ p.edad }}</td>
        <td>{{ p.diagnostico }}</td>
        <td><a href="{% url 'detalle_paciente' p.id %}" class="btn btn-info btn-sm">Ver</a></td>
      </tr>
      {% empty %}
      <tr><td colspan="5" class="text-center">No hay pacientes registrados</td></tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
